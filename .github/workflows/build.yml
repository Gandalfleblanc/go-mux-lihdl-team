name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install MKVToolNix + MediaInfo + embed binaries
        run: |
          brew install mkvtoolnix mediainfo
          mkdir -p internal/mkvtool/binaries/darwin-arm64
          cp "$(which mkvmerge)" internal/mkvtool/binaries/darwin-arm64/mkvmerge
          chmod +x internal/mkvtool/binaries/darwin-arm64/mkvmerge
          mkdir -p internal/mediainfo/binaries/darwin-arm64
          cp "$(which mediainfo)" internal/mediainfo/binaries/darwin-arm64/mediainfo
          chmod +x internal/mediainfo/binaries/darwin-arm64/mediainfo
      - name: Download static ffmpeg (evermeet, Intel — Rosetta sur arm64)
        run: |
          mkdir -p internal/audiosync/binaries/darwin-arm64
          curl -sSL -o ffmpeg.zip https://evermeet.cx/ffmpeg/getrelease/zip
          unzip -o ffmpeg.zip
          mv ffmpeg internal/audiosync/binaries/darwin-arm64/ffmpeg
          chmod +x internal/audiosync/binaries/darwin-arm64/ffmpeg
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
      - name: Build
        run: wails build -platform darwin/arm64
      - name: Ad-hoc codesign
        run: codesign --force --deep --sign - "build/bin/GO Mux LiHDL Team.app"
      - name: Zip .app
        run: cd build/bin && zip -r GO-Mux-LiHDL-Team-macos-arm64.zip "GO Mux LiHDL Team.app"
      - uses: actions/upload-artifact@v4
        with:
          name: GO-Mux-LiHDL-Team-macos-arm64
          path: build/bin/GO-Mux-LiHDL-Team-macos-arm64.zip

  build-macos-amd64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install MKVToolNix + MediaInfo + embed binaries
        run: |
          brew install mkvtoolnix mediainfo
          mkdir -p internal/mkvtool/binaries/darwin-amd64
          cp "$(which mkvmerge)" internal/mkvtool/binaries/darwin-amd64/mkvmerge
          chmod +x internal/mkvtool/binaries/darwin-amd64/mkvmerge
          mkdir -p internal/mediainfo/binaries/darwin-amd64
          cp "$(which mediainfo)" internal/mediainfo/binaries/darwin-amd64/mediainfo
          chmod +x internal/mediainfo/binaries/darwin-amd64/mediainfo
      - name: Download static ffmpeg (evermeet Intel)
        run: |
          mkdir -p internal/audiosync/binaries/darwin-amd64
          curl -sSL -o ffmpeg.zip https://evermeet.cx/ffmpeg/getrelease/zip
          unzip -o ffmpeg.zip
          mv ffmpeg internal/audiosync/binaries/darwin-amd64/ffmpeg
          chmod +x internal/audiosync/binaries/darwin-amd64/ffmpeg
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
      - name: Build
        run: wails build -platform darwin/amd64
      - name: Ad-hoc codesign
        run: codesign --force --deep --sign - "build/bin/GO Mux LiHDL Team.app"
      - name: Zip .app
        run: cd build/bin && zip -r GO-Mux-LiHDL-Team-macos-amd64.zip "GO Mux LiHDL Team.app"
      - uses: actions/upload-artifact@v4
        with:
          name: GO-Mux-LiHDL-Team-macos-amd64
          path: build/bin/GO-Mux-LiHDL-Team-macos-amd64.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install system dependencies + mkvmerge + mediainfo
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev mkvtoolnix mediainfo xz-utils
          mkdir -p internal/mkvtool/binaries/linux-amd64
          cp "$(which mkvmerge)" internal/mkvtool/binaries/linux-amd64/mkvmerge
          chmod +x internal/mkvtool/binaries/linux-amd64/mkvmerge
          mkdir -p internal/mediainfo/binaries/linux-amd64
          cp "$(which mediainfo)" internal/mediainfo/binaries/linux-amd64/mediainfo
          chmod +x internal/mediainfo/binaries/linux-amd64/mediainfo
      - name: Download static ffmpeg (BtbN GPL)
        run: |
          mkdir -p internal/audiosync/binaries/linux-amd64
          curl -sSL -o ffmpeg.tar.xz https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
          tar -xf ffmpeg.tar.xz
          cp ffmpeg-*/bin/ffmpeg internal/audiosync/binaries/linux-amd64/ffmpeg
          chmod +x internal/audiosync/binaries/linux-amd64/ffmpeg
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
      - name: Build
        run: wails build -platform linux/amd64 -tags webkit2_41
      - uses: actions/upload-artifact@v4
        with:
          name: GO-Mux-LiHDL-Team-linux-amd64
          path: build/bin/go-mux-lihdl-team

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Download MKVToolNix + MediaInfo + ffmpeg + embed binaries
        shell: bash
        run: |
          mkdir -p internal/mkvtool/binaries/windows-amd64
          curl -L -o mkv.7z https://mkvtoolnix.download/windows/releases/98.0/mkvtoolnix-64-bit-98.0.7z
          7z x mkv.7z -o./mkv-extract
          cp ./mkv-extract/mkvtoolnix/mkvmerge.exe internal/mkvtool/binaries/windows-amd64/mkvmerge.exe
          mkdir -p internal/mediainfo/binaries/windows-amd64
          curl -L -o mi.zip https://mediaarea.net/download/binary/mediainfo/24.12/MediaInfo_CLI_24.12_Windows_x64.zip
          7z x mi.zip -o./mi-extract
          cp ./mi-extract/MediaInfo.exe internal/mediainfo/binaries/windows-amd64/mediainfo.exe
          mkdir -p internal/audiosync/binaries/windows-amd64
          curl -L -o ffmpeg.zip https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip
          7z x ffmpeg.zip -o./ffmpeg-extract
          cp ./ffmpeg-extract/*/bin/ffmpeg.exe internal/audiosync/binaries/windows-amd64/ffmpeg.exe
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
      - name: Build
        run: wails build -platform windows/amd64
      - name: Rename exe
        shell: bash
        run: mv build/bin/go-mux-lihdl-team.exe "build/bin/GO Mux LiHDL Team.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: GO-Mux-LiHDL-Team-windows-amd64
          path: build/bin/GO Mux LiHDL Team.exe

  release:
    needs: [build-macos-arm64, build-macos-amd64, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Package Linux binary
        run: |
          cd GO-Mux-LiHDL-Team-linux-amd64 && tar -czf ../GO-Mux-LiHDL-Team-linux-amd64.tar.gz go-mux-lihdl-team && cd ..
      - name: Package Windows binary
        run: |
          cd GO-Mux-LiHDL-Team-windows-amd64 && zip ../GO-Mux-LiHDL-Team-windows-amd64.zip "GO Mux LiHDL Team.exe" && cd ..
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            GO-Mux-LiHDL-Team-macos-arm64/GO-Mux-LiHDL-Team-macos-arm64.zip
            GO-Mux-LiHDL-Team-macos-amd64/GO-Mux-LiHDL-Team-macos-amd64.zip
            GO-Mux-LiHDL-Team-linux-amd64.tar.gz
            GO-Mux-LiHDL-Team-windows-amd64.zip
          body: |
            ## GO Mux LiHDL Team

            Application de muxing .mkv selon les normes LiHDL avec MKVToolNix.

            ### Pré-requis
            **MKVToolNix doit être installé** sur ta machine (l'app utilise `mkvmerge`) :
            - macOS : `brew install mkvtoolnix`
            - Linux : `sudo apt install mkvtoolnix` (Debian/Ubuntu) ou équivalent
            - Windows : https://mkvtoolnix.download/downloads.html

            ### macOS
            Télécharger le `.zip` correspondant :
            - **Apple Silicon** (M1+) → `macos-arm64.zip`
            - **Intel** → `macos-amd64.zip`

            Dézipper, puis **au 1er lancement** dans un Terminal :
            ```bash
            xattr -cr "/chemin/vers/GO Mux LiHDL Team.app"
            ```

            ### Windows
            Télécharger `GO-Mux-LiHDL-Team-windows-amd64.zip`, dézipper, lancer l'exe.

            ### Linux
            ```bash
            tar -xzf GO-Mux-LiHDL-Team-linux-amd64.tar.gz
            chmod +x go-mux-lihdl-team
            ./go-mux-lihdl-team
            ```
            Nécessite `libwebkit2gtk-4.1`.
