name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
      - name: Build
        run: wails build -platform darwin/arm64
      - name: Ad-hoc codesign
        run: codesign --force --deep --sign - "build/bin/GO Mux LiHDL Team.app"
      - name: Zip .app
        run: cd build/bin && zip -r GO-Mux-LiHDL-Team-macos-arm64.zip "GO Mux LiHDL Team.app"
      - uses: actions/upload-artifact@v4
        with:
          name: GO-Mux-LiHDL-Team-macos-arm64
          path: build/bin/GO-Mux-LiHDL-Team-macos-arm64.zip

  build-macos-amd64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
      - name: Build
        run: wails build -platform darwin/amd64
      - name: Ad-hoc codesign
        run: codesign --force --deep --sign - "build/bin/GO Mux LiHDL Team.app"
      - name: Zip .app
        run: cd build/bin && zip -r GO-Mux-LiHDL-Team-macos-amd64.zip "GO Mux LiHDL Team.app"
      - uses: actions/upload-artifact@v4
        with:
          name: GO-Mux-LiHDL-Team-macos-amd64
          path: build/bin/GO-Mux-LiHDL-Team-macos-amd64.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
      - name: Build
        run: wails build -platform linux/amd64 -tags webkit2_41
      - uses: actions/upload-artifact@v4
        with:
          name: GO-Mux-LiHDL-Team-linux-amd64
          path: build/bin/go-mux-lihdl-team

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
      - name: Build
        run: wails build -platform windows/amd64
      - name: Rename exe
        shell: bash
        run: mv build/bin/go-mux-lihdl-team.exe "build/bin/GO Mux LiHDL Team.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: GO-Mux-LiHDL-Team-windows-amd64
          path: build/bin/GO Mux LiHDL Team.exe

  release:
    needs: [build-macos-arm64, build-macos-amd64, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Package Linux binary
        run: |
          cd GO-Mux-LiHDL-Team-linux-amd64 && tar -czf ../GO-Mux-LiHDL-Team-linux-amd64.tar.gz go-mux-lihdl-team && cd ..
      - name: Package Windows binary
        run: |
          cd GO-Mux-LiHDL-Team-windows-amd64 && zip ../GO-Mux-LiHDL-Team-windows-amd64.zip "GO Mux LiHDL Team.exe" && cd ..
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            GO-Mux-LiHDL-Team-macos-arm64/GO-Mux-LiHDL-Team-macos-arm64.zip
            GO-Mux-LiHDL-Team-macos-amd64/GO-Mux-LiHDL-Team-macos-amd64.zip
            GO-Mux-LiHDL-Team-linux-amd64.tar.gz
            GO-Mux-LiHDL-Team-windows-amd64.zip
          body: |
            ## GO Mux LiHDL Team

            Application de muxing .mkv selon les normes LiHDL avec MKVToolNix.

            ### Pré-requis
            **MKVToolNix doit être installé** sur ta machine (l'app utilise `mkvmerge`) :
            - macOS : `brew install mkvtoolnix`
            - Linux : `sudo apt install mkvtoolnix` (Debian/Ubuntu) ou équivalent
            - Windows : https://mkvtoolnix.download/downloads.html

            ### macOS
            Télécharger le `.zip` correspondant :
            - **Apple Silicon** (M1+) → `macos-arm64.zip`
            - **Intel** → `macos-amd64.zip`

            Dézipper, puis **au 1er lancement** dans un Terminal :
            ```bash
            xattr -cr "/chemin/vers/GO Mux LiHDL Team.app"
            ```

            ### Windows
            Télécharger `GO-Mux-LiHDL-Team-windows-amd64.zip`, dézipper, lancer l'exe.

            ### Linux
            ```bash
            tar -xzf GO-Mux-LiHDL-Team-linux-amd64.tar.gz
            chmod +x go-mux-lihdl-team
            ./go-mux-lihdl-team
            ```
            Nécessite `libwebkit2gtk-4.1`.
